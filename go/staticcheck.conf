# Run all staticcheck analyzers except two stylistic ST (stylecheck) rules:
#   ST1000 — "missing/incorrect package comment": requires a formatted
#            `// Package x ...` doc comment on every package, including small
#            internal ones. Pedantic for multi-package layouts; disabled.
#   ST1016 — "consistent method receiver names": flags a type whose methods use
#            different receiver names across files. Pure style; generates churn
#            during refactors with no correctness benefit. Disabled.
# Everything else in `all` (including the SA correctness analyzers) stays on.
# Re-enable either by removing it from this list if your project wants it.
checks = ["all", "-ST1000", "-ST1016"]
